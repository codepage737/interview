server:
  port: 8080

spring:
  application:
    name: interview

  profiles:
    active: dev

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
      org:
        hibernate:
          envers:
            audit_table_suffix=_aud:

  sql:
    init:
      mode: never
      data-locations: classpath:data.sql

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interview_db}
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin}
    hikari:
      poolName: Hikari
      auto-commit: false
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.shahrabi.interview: DEBUG
    org.springframework.security: DEBUG

springdoc:
  packages-to-scan: com.shahrabi.interview.web.rest.controller
  api-docs:
    enabled: true
  swagger-ui:
    oauth:
      client-id: interview-service
      client-secret: qI8FdIkBzyq8xUsInDhVmUUgdeYVQjJ6
    enabled: true
